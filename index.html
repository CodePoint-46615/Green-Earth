<!doctype html>
<html lang="en">
  <!-- head starts here -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title and favicon -->
    <title>Green Earth</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- daisy UI Integration -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- tailwind integration -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet file integration -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <!-- body starts here -->
  <body>
    <!-- nav bar section -->
    <nav class="navbar bg-base-100 shadow-sm bg-[#15803D] inter md:px-20">
      <!-- logo part -->
      <div class="navbar-start">
        <div class="dropdown">
          <!-- hamburger image -->
          <div tabindex="0" role="button" class="btn btn-ghost md:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h8m-8 6h16"
              />
            </svg>
          </div>

          <!-- hamburger menu -->
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
          >
            <li><a>About</a></li>
            <li><a>Gallery</a></li>
            <li><a>Plant a Tree</a></li>
          </ul>
        </div>

        <!-- logo -->
        <a class="text-[#FFFFFF] text-xl hover: cursor-pointer">Green Earth</a>
      </div>

      <!-- menu part -->
      <div class="text-white navbar-center hidden md:flex">
        <ul class="menu menu-horizontal px-1">
          <li><a>About</a></li>
          <li><a>Gallery</a></li>
          <li><a>Plant a Tree</a></li>
        </ul>
      </div>

      <!-- button part -->
      <div class="navbar-end">
        <a class="btn bg-[#FACC15] text-[#15803D] rounded-[999px]"
          >Plant a Tree</a
        >
      </div>
    </nav>

    <!-- main content section -->
    <main>
      <!-- hero section starts here -->
      <section class="inter hero-section bg-[#CFF0DC]">
        <!-- hero left image -->
        <div class="left-image">
          <img class="h-full w-full" src="./assets/hero-leaf1.png" alt="" />
        </div>

        <!-- hero-description-section -->
        <div class="description mt-5 md:mt-10 md:pb-20">
          <h2
            class="hero-title text-[48px] font-bold text-[#1F2937] text-center lg:whitespace-nowrap"
          >
            Plant a Tree, Grow a Future
          </h2>
          <p
            class="hero-description text-[16px] text-[#1F2937] font-normal text-center"
          >
            Join our mission to plant 1 million trees and make the Earth greener
            for future <br />
            generations.
          </p>

          <!-- button part -->
          <div class="text-center mt-6">
            <a class="btn bg-[#FACC15] text-[#15803D] rounded-[999px]"
              >Plant a Tree</a
            >
          </div>
        </div>

        <!-- hero-right-image -->
        <div class="right-image">
          <img class="h-full w-full" src="./assets/hero-leaf2.png" alt="" />
        </div>
      </section>

      <!-- choose tree section -->
      <section class="choose-tree inter">
        <div class="mt-[100px] max-w-[1200px] mx-auto border">
          <h2 class="choose-tree-title text-center font-semibold text-[32px] mb-10">Choose Your Tree</h2>

          <div class="category-button"></div>
          <div class="detail-slider"></div>
          <div class="cart"></div>
        </div>
      </section>
    </main>

    <!-- footer section -->
    <footer></footer>
  </body>
</html>
